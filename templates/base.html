


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        {% block title %}
            AI Ecommerce
        {% endblock %}
    </title>

    {% block extra_css %}
    {% endblock %}
</head>

<body>

    <header>
        <nav>
            <a href="/">
                AI Ecommerce
            </a>

            <a href="{% url 'products:list' %}">
                Products
            </a>

            {% if user.is_authenticated %}

                <span>
                    Hello, {{ user.username }}
                </span>

                <a href="{% url 'accounts:logout' %}">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'accounts:login' %}">
                    Login
                </a>

            {% endif %}
        </nav>
    </header>


    <main>

        {% block content %}
        {% endblock %}

    </main>


    <footer>

        <p>
            © 2026 AI Ecommerce
        </p>

    </footer>

</body>
</html>
