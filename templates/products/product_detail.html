


<!DOCTYPE html>
<html>
<head>
    <title>{{ product.name }}</title>
</head>
<body>

    <h1>{{ product.name }}</h1>

    <p>{{ product.description }}</p>

    <p>Price: {{ product.price }}</p>

    <p>Stock: {{ product.stock }}</p>

    <p>Category: {{ product.category.name }}</p>

    <h2>Reviews</h2>

    {% for review in product.reviews.all %}
        <div>
            <p>{{ review.rating }}/5</p>
            <p>{{ review.comment }}</p>
        </div>
    {% empty %}
        <p>No reviews yet.</p>
    {% endfor %}

</body>
</html>
