


<!DOCTYPE html>
<html>
<head>
    <title>Product Form</title>
</head>
<body>

    {% if product %}
        <h1>Update Product</h1>
    {% else %}
        <h1>Create Product</h1>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Save Product
        </button>

    </form>

</body>
</html>
