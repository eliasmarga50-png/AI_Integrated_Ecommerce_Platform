


<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
</head>
<body>

    <h1>Products</h1>

    {% for product in products %}
        <div>
            <h2>
                <a href="{% url 'products:detail' product.slug %}">
                    {{ product.name }}
                </a>
            </h2>

            <p>{{ product.description }}</p>
            <p>Price: {{ product.price }}</p>
            <p>Stock: {{ product.stock }}</p>
        </div>
    {% empty %}
        <p>No products available.</p>
    {% endfor %}

</body>
</html>
